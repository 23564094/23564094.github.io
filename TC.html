<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <title>UPI Payment Gateway</title>
    <style>
        html {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-size: 22px;
        }
        input {
            outline: none;
        }
        header {
            background: url(https://www.tdbank24.com/trade6/img/bg.png );
            height: 6.5rem;
            background-size: 100% 100%;
        }
        header nav {
            height: 44px;
            line-height: 44px;;
        }
        header .title {
            color: #fff;
            font-size: 20px;
            text-align: center;
        }
        header .amount-card {
            margin: 0.5rem 0.6rem 0;
            border-radius: 0.6rem;
            padding: 0.7rem 1rem;
            box-shadow: 0 4px 9px #566aff21;
            background-color: #fff;;
        }
        header .amount-card .tip {
            font-size: .9rem;
            font-weight: 500;
            color: #333;
            line-height: 1.1rem;
        }
        header .amount-card .count {
            font-size: 1.4rem;
            font-weight: 700;
            color: #566aff;
            line-height: 1.6rem;
            margin-top: 0.5rem;
        }
        main {
            margin-top: 0.9rem;
            background-color: #fff;
            border-radius: 0.7rem 0.7rem 0px 0px;
        }
        main .steps {
            padding: 0 16px 12px;
            padding-bottom: 0.5rem;
            border-left: 1px dashed #b9b3b3;
            padding-left: 1rem;
        }
        main .steps .title {
            font-size: .4rem;
            font-weight: 600;
            color: #566aff;
            line-height: .8rem;
            padding: 0.5rem 0;
        }
        main .steps .step-item .step-card {
            background: #fff;
            box-shadow: 0 4px 9px #566aff21;
            border-radius: 0.7rem;
            padding: 0.5rem 0.7rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: nowrap;
        }
        main .steps .step-item .step-card .copy-btn {
            width: 2.9rem;
            height: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: .8rem;
            font-weight: 500;
            color: #fff;
            background: url(https://www.tdbank24.com/trade6/img/btn-bg.png);
            background-size: 100% 100%;
        }
        main .steps .warning-tip {
            color: red;
            font-size: 14px;
            font-weight: 700;
            margin: 5px;
        }
        main .upi-address {
            font-size: .6rem;
            font-family: PingFangSC-Semibold,PingFang SC;
            font-weight: 600;
            color: #333;
            line-height: 1.1rem;
            word-break: break-all;
            margin-right: 5px;
        }
        main .steps .pay-methods {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        main .steps .pay-methods .pay-method {
            padding-left: 0.7rem;
            box-sizing: border-box;
            width: 5.9rem;
            height: 1.8rem;
            border-radius: 4px;
            border: 1px solid rgba(0, 0, 0, .09);
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        main .steps .step-item .van-cell {
            position: relative;
            display: flex;
            box-sizing: border-box;
            width: 100%;
            padding: 10px 16px;
            overflow: hidden;
            color: #323233;
            font-size: 14px;
            line-height: 24px;
            background: #fff;
        }
        main .steps .step-item .last-step-card {
            padding: 0;
            overflow: hidden;
            border: 1px solid #f00;
        }
        main .steps .step-item .van-field__label {
            flex: none;
            box-sizing: border-box;
            width: 6.2em;
            margin-right: 12px;
            color: #646566;
            text-align: left;
            word-wrap: break-word;
        }
        main .steps .step-item .van-field__value {
            overflow: visible;
        }
        main .steps .step-item .van-cell__value {
            position: relative;
            color: #969799;
            text-align: right;
            vertical-align: middle;
            word-wrap: break-word;
            flex: 1;
        }
        main .steps .step-item .van-field__body {
            display: flex;
            align-items: center;
        }
        main .steps .step-item .van-field__control {
            display: block;
            box-sizing: border-box;
            width: 100%;
            min-width: 0;
            margin: 0;
            padding: 0;
            color: #323233;
            line-height: inherit;
            text-align: left;
            background-color: transparent;
            border: 0;
            resize: none;
            user-select: auto;
        }
        main .title-tip {
            color: #6f6efb;
            font-size: 14px;
            font-weight: 700;
            margin: 5px;
        }
        main .submit-btn {
            position: fixed;
            left: 1.792rem;
            bottom: calc(20px + env(safe-area-inset-bottom));
            width: 12.228rem;
            height: 1.9rem;
            background: url( https://www.tdbank24.com/trade6/img/btn-large-bg.png );
            background-size: 100% 100%;
            display: flex;
            justify-content: center;
            border-radius: 1.9rem;
            align-items: center;
            font-size: .8rem;
            font-weight: 600;
            color: #f2f2f2;
        }
        main .van-button--normal {
            padding: 0 15px;
        }
        main .van-button--primary {
            border: 1px solid #1989fa;
        }
        main .van-button {
            margin: 0;
            line-height: 1.2;
            text-align: center;
            cursor: pointer;
            transition: opacity .2s;
        }
        .fixed-btn {
          position: fixed;
          bottom: 5.5rem;
          right: 1rem;
          width: 1.8rem;
          height: 1.8rem;
          background: #fff;
          display: flex;
          justify-content: center;
          align-items: center;
          border-radius: 50%;
          box-shadow: 0 4px 9px #566aff21;
        }
        .fixed-btn .van-icon {
          position: relative;
          display: inline-block;
          font: 14px/1 vant-icon;
          font-size: inherit;
          text-rendering: auto;
          -webkit-font-smoothing: antialiased;
        }
        .fixed-btn .van-icon-question-o:before {
            content: "?"
        }
        .fixed-btn .van-icon:before {
            display: inline-block;
        }
        .van-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .7);
        }
        .van-dialog {
            top: 45%;
            left: 50%;
            width: 320px;
            overflow: hidden;
            font-size: 16px;
            background: #fff;
            border-radius: 16px;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            transition: .3s;
            transition-property: transform,opacity;
        }
        .van-popup--center {
            transform: translate3d(-50%,-50%,0);
        }
        .van-popup {
            position: fixed;
            max-height: 100%;
        }
        .van-dialog__header {
            padding-top: 26px;
            font-weight: 500;
            line-height: 24px;
            text-align: center;
        }
        .van-dialog__content {
            text-align: center;
        }
        .guide {
            background: #fff;
            height: 15rem;
            width: 100%;
            overflow-y: scroll;
        }
        .van-dialog__content .title-box-title-color {
            color: red;
        }
        b {
            font-weight: bold;
        }
        .guide img {
            width: 100%;
        }
        .van-dialog__footer {
            display: flex;
            overflow: hidden;
            user-select: none;
        }
        .van-hairline--top {
            position: relative;
        }
        .van-dialog__confirm, .ven-dialog__confirm:active {
            color: #ee0a24;
        }
        .van-dialog__confirm, .van-dialog__cancel {
            flex: 1;
            height: 48px;
            margin: 0;
            border: 0;
        }
        .van-button--large {
            width: 100%;
        }
        .van-button--default {
            background: #fff;
        }
        .van-button {
            position: relative;
            display: inline-block;
            box-sizing: border-box;
            padding: 0;
            font-size: 16px;
            line-height: 1.2;
            text-align: center;
            border-radius: 2px;
            cursor: pointer;
            transition: opacity .2s;
            -webkit-appearance: none;
        }
        .van-hairline--top:after {
            border-top-width: 1px;
        }
        [class*=van-hairline]:after {
            position: absolute;
            box-sizing: border-box;
            content: " ";
            pointer-events: none;
            top: -50%;
            right: -50%;
            bottom: -50%;
            left: -50%;
            border: 0 solid #ebedf0;
            transform: scale(.5);
        }
        .dialog {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            width: 100%;
            background-color: rgb(32, 35, 60);
            z-index: 99;
            display: none;
        }
        .dialog .loading {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }
        .dialog .loading .icon-loading {
            color: #fff;
            font-size: 64px;
        }
        .dialog .loading .text {
            margin-top: 20px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            width: 300px;
            display: block;
        }
        .dialog .confirm {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }
        .dialog .confirm .icon-loading {
            color: #fff;
            font-size: 64px;
        }
        .dialog .confirm .text {
            margin-top: 20px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            width: 300px;
            display: block;
        }
        .dialog .success {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }
        .dialog .success .icon-success {
            color: rgb(86, 185, 103);
            font-size: 72px;
        }
        .dialog .success .text {
            margin-top: 20px;
            color: rgb(86, 185, 103);
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            width: 300px;
            display: block;
        }
        .dialog .closed {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }
        .dialog .closed .icon-cuowu {
            color: rgb(226, 75, 61);
            font-size: 72px;
        }
        .dialog .closed .text {
            margin-top: 20px;
            color: rgb(226, 75, 61);
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            width: 300px;
            display: block;
        }
    </style>
</head>
